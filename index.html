<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Simulator</title>
    <!-- Inline styles for the first-visit about:blank prompt. Inlined so the modal can paint
         without waiting for the external stylesheet to download. -->
    <style>
      #ab-prompt { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100000; font-family: -apple-system, Segoe UI, Roboto, sans-serif; color: #eee; }
      #ab-prompt[hidden] { display: none; }
      #ab-prompt .ab-modal { background: rgba(15,15,25,0.95); border: 1px solid #2a2a3a; border-radius: 12px; padding: 28px 32px; max-width: 460px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
      #ab-prompt h2 { margin: 0 0 12px; font-size: 20px; letter-spacing: 0.04em; }
      #ab-prompt p  { margin: 8px 0; font-size: 13px; opacity: 0.85; line-height: 1.5; }
      #ab-prompt code { background: rgba(60,60,90,0.5); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
      #ab-prompt .ab-warn { color: #fca5a5; font-size: 11.5px; opacity: 0.75; margin-top: 12px; }
      #ab-prompt .ab-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
      #ab-prompt button { padding: 10px 18px; font-size: 13px; cursor: pointer; border-radius: 6px; border: 1px solid #2a2a3a; background: rgba(40,40,60,0.85); color: #eee; letter-spacing: 0.04em; }
      #ab-prompt button:hover { background: rgba(60,60,90,0.95); }
      #ab-prompt button.ab-yes { background: rgba(70,110,160,0.95); border-color: #557; }
      #ab-prompt button.ab-yes:hover { background: rgba(90,140,200,1); }
    </style>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- First-visit prompt. Sits at top of <body> so it parses before everything else and
         covers the viewport via z-index 100000 — appears before the loading screen / GUI. -->
    <div id="ab-prompt" hidden>
      <div class="ab-modal">
        <h2>Launch in <code>about:blank</code>?</h2>
        <p>Open the simulator inside an <code>about:blank</code> tab — the address bar shows <code>about:blank</code> instead of the site URL.</p>
        <p>Either choice runs the simulator normally. This question is only asked once.</p>
        <div class="ab-buttons">
          <button type="button" class="ab-yes" id="ab-yes">Yes, use about:blank</button>
          <button type="button" id="ab-no">No, continue here</button>
        </div>
        <p class="ab-warn">If the new tab doesn't open, allow popups for this site.</p>
      </div>
    </div>
    <script>
      // Inline (not a module) so it runs synchronously during HTML parse, before the
      // type=module main.js boots. Shows the prompt only on the very first visit per
      // origin (per localStorage). The iframe loaded inside about:blank shares the
      // same origin and therefore the same localStorage, so it never re-prompts.
      (function () {
        var KEY = 'spaceSim:abPrompt:answered';
        try { if (localStorage.getItem(KEY)) return; } catch (e) { return; }

        var modal = document.getElementById('ab-prompt');
        if (!modal) return;
        modal.hidden = false;

        function dismiss() {
          try { localStorage.setItem(KEY, '1'); } catch (e) {}
          modal.hidden = true;
        }

        document.getElementById('ab-no').addEventListener('click', dismiss);

        document.getElementById('ab-yes').addEventListener('click', function () {
          // Mark answered first so the inner iframe (same origin → same localStorage)
          // doesn't show the prompt again.
          try { localStorage.setItem(KEY, '1'); } catch (e) {}

          var win = window.open('about:blank', '_blank');
          if (!win || win.closed) {
            alert('Popup blocked. Allow popups for this site and try again, or click "No, continue here".');
            return;
          }
          try {
            var doc = win.document;
            doc.title = 'Space Simulator';
            doc.documentElement.style.height = '100%';
            doc.body.style.cssText = 'margin:0;padding:0;height:100%;background:#000;overflow:hidden';
            var iframe = doc.createElement('iframe');
            iframe.src = window.location.href;
            iframe.setAttribute('allow', 'fullscreen');
            iframe.setAttribute('style', 'position:fixed;inset:0;width:100vw;height:100vh;border:0;margin:0');
            doc.body.appendChild(iframe);
          } catch (err) {
            alert('Could not set up about:blank embedding: ' + err.message + '\nContinuing in this tab.');
            modal.hidden = true;
            return;
          }
          // Replace this tab's content with a "you can close this" message so the user
          // ends up using only the about:blank tab.
          document.body.innerHTML =
            '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#eee;font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;text-align:center;padding:20px;letter-spacing:0.04em">' +
            'Simulator opened in a new <code>about:blank</code> tab.<br>You can close this tab.' +
            '</div>';
        });
      })();
    </script>
    <div id="loading-screen"></div>
    <canvas id="scene"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
